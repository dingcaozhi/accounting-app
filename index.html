<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账助手 - 轻松管理收支</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 登录/注册页面 -->
        <div id="authPage" class="page">
            <div class="auth-container">
                <div class="auth-header">
                    <div class="logo">💰</div>
                    <h1>记账助手</h1>
                    <p>云端同步，随时随地记账</p>
                </div>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">登录</button>
                    <button class="auth-tab" data-tab="register">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                    <p class="auth-hint">数据存储在 Supabase 云端，多设备同步</p>
                </form>
                
                <!-- 注册表单 -->
                <form id="registerForm" class="auth-form hidden">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="regEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="regUsername" placeholder="设置用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="regPassword" placeholder="至少6位密码" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">注册</button>
                </form>
            </div>
        </div>

        <!-- 主应用页面 -->
        <div id="mainPage" class="page hidden">
            <!-- 顶部导航 -->
            <header class="header">
                <div class="header-left">
                    <h2>记账助手</h2>
                </div>
                <div class="header-right">
                    <span id="currentUser" class="username"></span>
                    <button class="btn-icon" onclick="app.showSettings()">⚙️</button>
                    <button class="btn-icon" onclick="app.logout()">🚪</button>
                </div>
            </header>

            <!-- 统计卡片 -->
            <div class="stats-cards">
                <div class="stat-card income">
                    <div class="stat-label">本月收入</div>
                    <div class="stat-amount" id="monthIncome">¥0.00</div>
                </div>
                <div class="stat-card expense">
                    <div class="stat-label">本月支出</div>
                    <div class="stat-amount" id="monthExpense">¥0.00</div>
                </div>
                <div class="stat-card balance">
                    <div class="stat-label">本月结余</div>
                    <div class="stat-amount" id="monthBalance">¥0.00</div>
                </div>
            </div>

            <!-- 快捷记账按钮 -->
            <div class="quick-add">
                <button class="btn btn-expense" onclick="app.showAddModal('expense')">
                    <span class="icon">➖</span>
                    记支出
                </button>
                <button class="btn btn-income" onclick="app.showAddModal('income')">
                    <span class="icon">➕</span>
                    记收入
                </button>
            </div>

            <!-- 筛选标签 -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">全部</button>
                <button class="filter-tab" data-filter="expense">支出</button>
                <button class="filter-tab" data-filter="income">收入</button>
            </div>

            <!-- 账单列表 -->
            <div class="records-list" id="recordsList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 添加记录弹窗 -->
        <div id="addModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">记一笔</h3>
                    <button class="btn-close" onclick="app.closeAddModal()">&times;</button>
                </div>
                <form id="addForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>类型</label>
                            <div class="type-selector">
                                <label class="radio-label">
                                    <input type="radio" name="type" value="expense" checked>
                                    <span class="radio-text expense">支出</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="type" value="income">
                                    <span class="radio-text income">收入</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>金额</label>
                            <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>分类</label>
                            <select id="category" required>
                                <!-- 动态生成 -->
                            </select>
                            <button type="button" class="btn btn-small" onclick="app.showCategoryManager()">+ 管理分类</button>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>日期</label>
                            <input type="date" id="date" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>备注</label>
                            <input type="text" id="remark" placeholder="可选">
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="app.closeAddModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 分类管理弹窗 -->
        <div id="categoryModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>管理分类</h3>
                    <button class="btn-close" onclick="app.closeCategoryModal()">&times;</button>
                </div>
                
                <div class="category-tabs">
                    <button class="category-tab active" data-type="expense">支出分类</button>
                    <button class="category-tab" data-type="income">收入分类</button>
                </div>
                
                <div class="category-list" id="categoryList">
                    <!-- 动态生成 -->
                </div>
                
                <div class="add-category">
                    <input type="text" id="newCategoryName" placeholder="新分类名称">
                    <button class="btn btn-primary" onclick="app.addCategory()">添加</button>
                </div>
            </div>
        </div>

        <!-- 设置弹窗 -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>设置</h3>
                    <button class="btn-close" onclick="app.closeSettingsModal()">&times;</button>
                </div>
                
                <div class="settings-list">
                    <div class="setting-item">
                        <span>数据导出</span>
                        <button class="btn btn-small" onclick="app.exportData()">导出JSON</button>
                    </div>
                    <div class="setting-item">
                        <span>数据导入</span>
                        <input type="file" id="importFile" accept=".json" hidden onchange="app.importData(this)">
                        <button class="btn btn-small" onclick="document.getElementById('importFile').click()">导入JSON</button>
                    </div>
                    <div class="setting-item danger">
                        <span>清除所有数据</span>
                        <button class="btn btn-danger btn-small" onclick="app.clearAllData()">清除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
